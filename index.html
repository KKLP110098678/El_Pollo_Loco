<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="assets/img/6_salsa_bottle/1_salsa_bottle_on_ground.png">
    <title>El Pollo Loco</title>
</head>
<body>
    <div class="content">
        <h1>El Pollo Loco</h1>
        <div style="position: relative; display: inline-block;">
            <canvas id="gameCanvas" width="720" height="480"></canvas>
            <button id="pauseBtn" class="pause-btn" style="display:none;" onclick="togglePause(); this.blur();">⏸</button>
            <div id="pauseMenu" class="pause-menu" style="display:none;">
                <div class="pause-menu-content">
                    <h2>Pause</h2>
                    <button onclick="togglePause()">Weiter spielen</button>
                    <button onclick="returnToMainMenu()">Hauptmenü</button>
                </div>
            </div>
            <div id="introScreen" class="overlay">
                <p class="intro-text">Press a key to continue</p>
            </div>
            <div id="startScreen" class="overlay" style="display:none;" id="startScreen">
                <button class="keybindings-btn" onclick="showKeybindings()" title="Tastenbelegung">!</button>
                <button class="settings-btn" onclick="showSettings()" title="Einstellungen">⚙</button>
                <h2>Select Level</h2>
                <div class="level-button-wrapper">
                    <button onclick="startGame(1)">Level 1</button>
                    <div id="level1Badge" class="level-completed-badge" style="display:none;">✓</div>
                </div>
                <div class="level-button-wrapper">
                    <button onclick="startGame(2)">Level 2</button>
                    <div id="level2Badge" class="level-completed-badge" style="display:none;">✓</div>
                </div>
            </div>
            <div id="keybindingsModal" class="keybindings-modal" style="display:none;">
                <div class="keybindings-content">
                    <h3>Tastenbelegung</h3>
                    <table class="keybindings-table">
                        <tr><td><kbd>A</kbd></td><td>Nach links laufen</td></tr>
                        <tr><td><kbd>D</kbd></td><td>Nach rechts laufen</td></tr>
                        <tr><td><kbd>Space</kbd></td><td>Springen</td></tr>
                        <tr><td><kbd>F</kbd></td><td>Flasche werfen</td></tr>
                    </table>
                    <button class="btn-close" onclick="hideKeybindings()">Schließen</button>
                </div>
            </div>
            <div id="settingsModal" class="keybindings-modal" style="display:none;">
                <div class="keybindings-content">
                    <h3>Einstellungen</h3>
                    <div class="settings-body">
                        <label for="fullscreenCheckbox">Fullscreen</label>
                        <input type="checkbox" id="fullscreenCheckbox" onchange="toggleFullscreen()">
                        <label for="volumeSlider">Effekte</label>
                        <div class="volume-slider-row">
                            <span>🔇</span>
                            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="1" oninput="setGameVolume(this.value)">
                            <span>🔊</span>
                        </div>
                        <label for="musicSlider">Musik</label>
                        <div class="volume-slider-row">
                            <span>🔇</span>
                            <input type="range" id="musicSlider" min="0" max="1" step="0.05" value="0.3" oninput="setMusicVolume(this.value)">
                            <span>🔊</span>
                        </div>
                    </div>
                    <div class="settings-footer">
                        <button class="btn-close" onclick="hideSettings()">Schließen</button>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <p>© 2024 Ramon Kunz. All rights reserved.</p>
            <p><a href="legal.html">Impressum</a></p>
        </footer>
    </div>
    <div id="orientationHint" class="orientation-hint" style="display:none;">
        <div class="orientation-hint-content">
            <div class="orientation-icon">&#8635;</div>
            <p>Bitte drehe dein Gerät ins Querformat</p>
        </div>
    </div>
    <script src="./models/level.class.js"></script>
    <script src="./models/world.class.js"></script>
    <script src="./models/drawable-object.class.js"></script>
    <script src="./models/movable-object.class.js"></script>
    <script src="./models/collectable.class.js"></script>
    <script src="./models/coin.class.js"></script>
    <script src="./models/status-bar.class.js"></script>    
    <script src="./models/status-counter.class.js"></script>
    <script src="./models/mobile-button.class.js"></script>
    <script src="./models/throwable-object.class.js"></script>
    <script src="./models/creature.class.js"></script>
    <script src="./path/character-images.js"></script>
    <script src="./models/character.class.js"></script>
    <script src="./models/npc.class.js"></script>
    <script src="./models/enemy.class.js"></script>
    <script src="./path/chicken-images.js"></script>
    <script src="./models/chicken.class.js"></script>
    <script src="./path/small-chicken-images.js"></script>
    <script src="./models/small-chicken.class.js"></script>
    <script src="./path/boss-chicken-images.js"></script>
    <script src="./models/boss-chicken.class.js"></script>
    <script src="./models/cloud.class.js"></script>
    <script src="./models/background-object.class.js"></script>
    <script src="./models/structures.class.js"></script>
    <script src="./models/sky.class.js"></script>
    <script src="./levels/level1.js"></script>
    <script src="./levels/level2.js"></script>
    <script src="./models/keyboard.class.js"></script>
    <script src="./js/game.js"></script>
    <script src="./js/sound.js"></script>
</body>
</html>
